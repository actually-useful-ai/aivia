openapi: 3.1.0
info:
  title: imgbb API
  description: The imgbb API allows users to upload images to imgbb's hosting service.
  version: 1.0.0

servers:
  - url: https://api.imgbb.com/1
    description: Production API server

paths:
  /upload:
    post:
      operationId: uploadImage
      summary: Upload an image
      description: Uploads an image to imgbb with an optional expiration time. Supports binary file, base64 data, or URL for an image (up to 32 MB).
      parameters:
        - name: expiration
          in: query
          required: false
          description: The number of seconds until the image expires (60-15552000).
          schema:
            type: integer
            minimum: 60
            maximum: 15552000
        - name: key
          in: query
          required: true
          description: Your client API key.
          schema:
            type: string
        - name: name
          in: query
          required: false
          description: The name of the file. Automatically detected if uploading a file with multipart/form-data.
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: The image file to upload.
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                image:
                  type: string
                  description: Base64 data or URL for an image.
      responses:
        '200':
          description: Image uploaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          description: Invalid request, possibly due to missing or incorrect parameters.
        '401':
          description: Unauthorized, invalid or missing API key.
        '500':
          description: Server error during file upload.

  /image/{image_id}:
    get:
      operationId: getImage
      summary: Get image details
      description: Retrieves details of an uploaded image.
      parameters:
        - name: image_id
          in: path
          required: true
          description: ID of the uploaded image.
          schema:
            type: string
        - name: key
          in: query
          required: true
          description: Your client API key.
          schema:
            type: string
      responses:
        '200':
          description: Image details retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '404':
          description: Image not found.
        '401':
          description: Unauthorized, invalid or missing API key.

  /delete/{image_id}/{delete_token}:
    get:
      operationId: deleteImage
      summary: Delete an image
      description: Deletes an uploaded image using its ID and delete token.
      parameters:
        - name: image_id
          in: path
          required: true
          description: ID of the image to delete.
          schema:
            type: string
        - name: delete_token
          in: path
          required: true
          description: Token required for deletion.
          schema:
            type: string
        - name: key
          in: query
          required: true
          description: Your client API key.
          schema:
            type: string
      responses:
        '200':
          description: Image deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '404':
          description: Image not found.
        '401':
          description: Unauthorized, invalid token or API key.

components:
  schemas:
    UploadResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: string
              description: Unique identifier for the image.
            title:
              type: string
              description: Title/name of the uploaded image.
            url_viewer:
              type: string
              description: URL to view the image on imgbb website.
            url:
              type: string
              description: Direct URL to the image.
            display_url:
              type: string
              description: URL for displaying the image.
            width:
              type: string
              description: Width of the image in pixels.
            height:
              type: string
              description: Height of the image in pixels.
            size:
              type: string
              description: Size of the image in bytes.
            time:
              type: string
              description: Upload timestamp.
            expiration:
              type: string
              description: Expiration timestamp (0 if none).
            image:
              type: object
              properties:
                filename:
                  type: string
                name:
                  type: string
                mime:
                  type: string
                extension:
                  type: string
                url:
                  type: string
            thumb:
              type: object
              properties:
                filename:
                  type: string
                name:
                  type: string
                mime:
                  type: string
                extension:
                  type: string
                url:
                  type: string
            medium:
              type: object
              properties:
                filename:
                  type: string
                name:
                  type: string
                mime:
                  type: string
                extension:
                  type: string
                url:
                  type: string
            delete_url:
              type: string
              description: URL to delete the image.
        success:
          type: boolean
          description: Indicates whether the upload was successful.
        status:
          type: integer
          description: HTTP status code of the response.

    ImageResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: string
              description: Unique identifier for the image.
            title:
              type: string
              description: Title/name of the image.
            url:
              type: string
              description: Direct URL to the image.
            size:
              type: string
              description: Size dimensions of the image.
            delete_url:
              type: string
              description: URL to delete the image.
        success:
          type: boolean
          description: Indicates whether the request was successful.

    DeleteResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            message:
              type: string
              description: Success or error message.
        success:
          type: boolean
          description: Indicates whether the deletion was successful.

  examples:
    uploadImage:
      value:
        ReqExample:
          key: "YOUR_API_KEY"
          expiration: 600
          image: "base64_encoded_image_data"
        RespExample:
          data:
            id: "2ndCYJK"
            title: "c1f64245afb2"
            url_viewer: "https://ibb.co/2ndCYJK"
            url: "https://i.ibb.co/w04Prt6/c1f64245afb2.gif"
            display_url: "https://i.ibb.co/98W13PY/c1f64245afb2.gif"
            width: "1"
            height: "1"
            size: "42"
            time: "1552042565"
            expiration: "0"
            image:
              filename: "c1f64245afb2.gif"
              name: "c1f64245afb2"
              mime: "image/gif"
              extension: "gif"
              url: "https://i.ibb.co/w04Prt6/c1f64245afb2.gif"
            thumb:
              filename: "c1f64245afb2.gif"
              name: "c1f64245afb2"
              mime: "image/gif"
              extension: "gif"
              url: "https://i.ibb.co/2ndCYJK/c1f64245afb2.gif"
            medium:
              filename: "c1f64245afb2.gif"
              name: "c1f64245afb2"
              mime: "image/gif"
              extension: "gif"
              url: "https://i.ibb.co/98W13PY/c1f64245afb2.gif"
            delete_url: "https://ibb.co/2ndCYJK/670a7e48ddcb85ac340c717a41047e5c"
          success: true
          status: 200

    getImage:
      value:
        ReqExample:
          image_id: "2ndCYJK"
          key: "YOUR_API_KEY"
        RespExample:
          data:
            id: "2ndCYJK"
            title: "example_image.jpg"
            url: "https://i.ibb.co/w04Prt6/example_image.jpg"
            size: "1024x768"
            delete_url: "https://ibb.co/2ndCYJK/670a7e48ddcb85ac340c717a41047e5c"
          success: true

    deleteImage:
      value:
        ReqExample:
          image_id: "2ndCYJK"
          delete_token: "670a7e48ddcb85ac340c717a41047e5c"
          key: "YOUR_API_KEY"
        RespExample:
          data:
            message: "Image deleted successfully"
          success: true 