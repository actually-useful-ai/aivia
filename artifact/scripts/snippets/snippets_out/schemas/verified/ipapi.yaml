openapi: 3.1.0
info:
  title: IPAPI Location Lookup
  version: 1.0.0
  description: The IPAPI service provides location information for a given IP address.

servers:
  - url: https://ipapi.co

paths:
  /json/:
    get:
      operationId: getIpInfo
      summary: This endpoint returns the location information for the provided IP address in JSON format.
      parameters:
        - name: ip
          in: query
          required: true
          description: IP address to lookup information for.
          schema:
            type: string
      responses:
        "200":
          description: Successful response with location information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpInfoResponse'
        default:
          description: Unexpected error.

components:
  schemas:
    IpInfoResponse:
      type: object
      properties:
        asn:
          type: string
          description: Autonomous System Number.
        city:
          type: string
          description: City name.
        continent_code:
          type: string
          description: Two-letter continent code.
        country:
          type: string
          description: Two-letter country code.
        country_area:
          type: number
          description: Country area in square kilometers.
        country_calling_code:
          type: string
          description: Country calling code with plus prefix.
        country_capital:
          type: string
          description: Capital city of the country.
        country_code:
          type: string
          description: Two-letter country code.
        country_code_iso3:
          type: string
          description: Three-letter country code.
        country_name:
          type: string
          description: Full country name.
        country_population:
          type: integer
          description: Country population.
        country_tld:
          type: string
          description: Country-specific top level domain.
        currency:
          type: string
          description: Currency code.
        currency_name:
          type: string
          description: Currency name.
        in_eu:
          type: boolean
          description: Whether the location is in the European Union.
        ip:
          type: string
          description: The IP address being looked up.
        languages:
          type: string
          description: Comma-separated list of languages.
        latitude:
          type: number
          description: Latitude coordinate.
        longitude:
          type: number
          description: Longitude coordinate.
        network:
          type: string
          description: Network address range.
        org:
          type: string
          description: Organization name.
        postal:
          type: string
          description: Postal code.
        region:
          type: string
          description: Region/state name.
        region_code:
          type: string
          description: Region/state code.
        timezone:
          type: string
          description: Timezone name.
        utc_offset:
          type: string
          description: UTC offset with sign.
        version:
          type: string
          description: IP version (IPv4 or IPv6).

  examples:
    getIpInfo:
      value:
        ReqExample:
          ip: 63c5:9988:3792:40aa:0998:db93:8b3e:4dbb
        RespExample:
          asn: AS31898
          city: Ashburn
          continent_code: NA
          country: US
          country_area: 9629091
          country_calling_code: "+1"
          country_capital: Washington
          country_code: US
          country_code_iso3: USA
          country_name: United States
          country_population: 327167434
          country_tld: .us
          currency: USD
          currency_name: Dollar
          in_eu: false
          ip: 129.80.117.174
          languages: en-US,es-US,haw,fr
          latitude: 39.0373
          longitude: -77.4805
          network: 129.80.0.0/16
          org: ORACLE-BMC-31898
          postal: "20147"
          region: Virginia
          region_code: VA
          timezone: America/New_York
          utc_offset: "-0400"
          version: IPv4 