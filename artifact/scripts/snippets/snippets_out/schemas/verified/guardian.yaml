openapi: 3.1.0
info:
  title: The Guardian API
  description: API for accessing The Guardian's news content and metadata.
  version: '1.0.0'
servers:
  - url: https://content.guardianapis.com
paths:
  /search:
    get:
      summary: Search content
      description: Search for content across The Guardian.
      operationId: searchContent
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search query string.
        - name: section
          in: query
          required: false
          schema:
            type: string
          description: Section name to filter by.
        - name: tag
          in: query
          required: false
          schema:
            type: string
          description: Tag to filter by.
        - name: page
          in: query
          required: false
          schema:
            type: integer
          description: Page number for pagination.
        - name: page-size
          in: query
          required: false
          schema:
            type: integer
          description: Number of items per page.
        - name: from-date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date for search (YYYY-MM-DD).
        - name: to-date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date for search (YYYY-MM-DD).
        - name: order-by
          in: query
          required: false
          schema:
            type: string
            enum: [newest, oldest, relevance]
          description: Sort order for results.
        - name: api-key
          in: query
          required: true
          schema:
            type: string
          description: API key for authentication.
      responses:
        '200':
          description: A list of content items matching the search criteria.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    properties:
                      status:
                        type: string
                      total:
                        type: integer
                      startIndex:
                        type: integer
                      pageSize:
                        type: integer
                      currentPage:
                        type: integer
                      pages:
                        type: integer
                      results:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            type:
                              type: string
                            sectionId:
                              type: string
                            sectionName:
                              type: string
                            webPublicationDate:
                              type: string
                              format: date-time
                            webTitle:
                              type: string
                            webUrl:
                              type: string
                            apiUrl:
                              type: string
  /sections:
    get:
      summary: Get sections
      description: Get a list of all sections.
      operationId: getSections
      parameters:
        - name: api-key
          in: query
          required: true
          schema:
            type: string
          description: API key for authentication.
      responses:
        '200':
          description: A list of all sections.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    properties:
                      status:
                        type: string
                      results:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            webTitle:
                              type: string
                            webUrl:
                              type: string
                            apiUrl:
                              type: string
  /tags:
    get:
      summary: Get tags
      description: Get a list of all tags.
      operationId: getTags
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search query for tags.
        - name: type
          in: query
          required: false
          schema:
            type: string
          description: Type of tag to filter by.
        - name: api-key
          in: query
          required: true
          schema:
            type: string
          description: API key for authentication.
      responses:
        '200':
          description: A list of tags matching the search criteria.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    properties:
                      status:
                        type: string
                      results:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            type:
                              type: string
                            webTitle:
                              type: string
                            webUrl:
                              type: string
                            apiUrl:
                              type: string
``` 