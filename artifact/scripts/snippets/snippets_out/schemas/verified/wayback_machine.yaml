components:
    examples:
        getSnapshot:
            value:
                ReqExample:
                    url: https://aaclive.com
                RespExample:
                    archived_snapshots:
                        closest:
                            available: true
                            status: "200"
                            timestamp: "20240812020257"
                            url: http://web.archive.org/web/20240812020257/https://aaclive.com/
                    url: https://aaclive.com
    schemas:
        SnapshotResponse:
            type: object
            description: Response with snapshot availability information
            properties:
                archived_snapshots:
                    type: object
                    description: Container for snapshot information, which may be empty if no snapshots are available
                    properties:
                        closest:
                            type: object
                            description: The closest archived snapshot to the requested timestamp
                            properties:
                                available:
                                    type: boolean
                                    description: Whether an archived snapshot is available
                                status:
                                    type: string
                                    description: HTTP status code of the snapshot
                                timestamp:
                                    type: string
                                    description: Timestamp of the snapshot in YYYYMMDDhhmmss format
                                url:
                                    type: string
                                    description: URL of the archived snapshot in the Wayback Machine
                url:
                    type: string
                    description: The original URL that was queried
                timestamp:
                    type: string
                    description: The requested timestamp (only included if provided in the request)
        CDXResponse:
            type: array
            description: |
                JSON array of CDX data, where the first row is the header
                containing field names, and subsequent rows are the data.
            items:
                type: array
                items:
                    type: string
            example:
                - ["urlkey", "timestamp", "original", "mimetype", "statuscode", "digest", "length"]
                - ["org,example)/", "20100101050304", "http://example.org:80/", "text/html", "200", "ABCDEF123456", "1234"]
                - ["org,example)/", "20100201050304", "http://example.org:80/", "text/html", "200", "ABCDEF789012", "1256"]
        Error:
            type: object
            properties:
                detail:
                    type: string
                    description: Error message
info:
    description: Retrieves website snapshots from the Wayback Machine.
    title: The Wayback Machine
    version: 1.0.0
openapi: 3.1.0
paths:
    /wayback/available:
        get:
            operationId: getSnapshot
            parameters:
                - description: URL of the website to retrieve the snapshot for
                  in: query
                  name: url
                  required: true
                  schema:
                    default: https://aaclive.com
                    type: string
                - description: Timestamp in the format YYYYMMDDhhmmss to retrieve snapshots at a certain time
                  in: query
                  name: timestamp
                  schema:
                    type: string
                - description: Optional callback to produce a JSONP response
                  in: query
                  name: callback
                  schema:
                    type: string
            responses:
                '200':
                    description: Snapshot availability information
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SnapshotResponse'
                            examples:
                                with_snapshot:
                                    value:
                                        archived_snapshots:
                                            closest:
                                                available: true
                                                status: "200"
                                                timestamp: "20240112020257"
                                                url: "http://web.archive.org/web/20240112020257/https://example.com/"
                                        url: "https://example.com"
                                without_snapshot:
                                    value:
                                        url: "google.com"
                                        archived_snapshots: {}
                                with_timestamp:
                                    value:
                                        url: "google.com"
                                        archived_snapshots: {}
                                        timestamp: "20100101"
                default:
                    description: ""
            summary: This tool allows you to retrieve images from a given URL using the Wayback Machine. Enter the URL of the webpage to access and download the archived images.
    /cdx/search/cdx:
        get:
            operationId: searchCDX
            summary: Search the Wayback Machine index
            description: |
                The CDX Server API allows for complex querying, filtering, and analysis of Wayback capture data.
                It returns index data for archived URLs, with various filtering and output options.
            parameters:
                - name: url
                  in: query
                  required: true
                  description: URL to search in the archive (should be URL-encoded if it contains a query)
                  schema:
                    type: string
                    example: "example.com"
                - name: output
                  in: query
                  description: Output format (if "json", returns JSON array instead of plain text)
                  schema:
                    type: string
                    enum: ["json"]
                - name: fl
                  in: query
                  description: |
                    Comma-separated list of fields to return in the response. 
                    Available fields: urlkey, timestamp, original, mimetype, statuscode, digest, length
                  schema:
                    type: string
                    example: "timestamp,original,mimetype"
                - name: from
                  in: query
                  description: |
                    Start timestamp for filtering results (YYYYMMDDhhmmss format, 1-14 digits)
                    Results are inclusive of this timestamp.
                  schema:
                    type: string
                    pattern: "^[0-9]{1,14}$"
                    example: "2010"
                - name: to
                  in: query
                  description: |
                    End timestamp for filtering results (YYYYMMDDhhmmss format, 1-14 digits)
                    Results are inclusive of this timestamp.
                  schema:
                    type: string
                    pattern: "^[0-9]{1,14}$"
                    example: "2011"
                - name: filter
                  in: query
                  description: |
                    Filter results by specific field. Format: [!]field:regex
                    Multiple filter parameters can be specified.
                    The '!' prefix inverts the match (exclude matching results).
                    field is one of the CDX fields (urlkey, timestamp, original, mimetype, statuscode, digest, length)
                    regex is any standard Java regex pattern.
                  schema:
                    type: string
                    example: "statuscode:200"
                - name: limit
                  in: query
                  description: Maximum number of results to return
                  schema:
                    type: integer
                    minimum: 1
                    example: 10
                - name: collapse
                  in: query
                  description: |
                    Collapse consecutive captures based on a field. 
                    Format: field:N - where N is the number of digits to use for comparison.
                    If N is missing, all digits are compared.
                  schema:
                    type: string
                    example: "timestamp:4"
                - name: gzip
                  in: query
                  description: Whether to return gzip-encoded data (default is true)
                  schema:
                    type: boolean
                    default: true
                - name: closest
                  in: query
                  description: |
                    Find the closest capture to the specified timestamp.
                    Format: YYYYMMDDhhmmss (1-14 digits)
                  schema:
                    type: string
                    pattern: "^[0-9]{1,14}$"
                    example: "20100101"
                - name: resolveRevisits
                  in: query
                  description: If set to 'true', replace revisit records with the original capture they refer to
                  schema:
                    type: boolean
                - name: showResumeKey
                  in: query
                  description: |
                    If true, returns a resumeKey at the end of the results 
                    that can be used for pagination
                  schema:
                    type: boolean
                - name: resumeKey
                  in: query
                  description: Resume key from a previous query to continue pagination
                  schema:
                    type: string
            responses:
                '200':
                    description: CDX search results
                    content:
                        text/plain:
                            schema:
                                type: string
                                description: |
                                    Plain text CDX data, one line per capture, space-delimited columns.
                                    Each line contains fields in the order specified or in the default order.
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CDXResponse'
                            example:
                                - ["urlkey", "timestamp", "original", "mimetype", "statuscode", "digest", "length"]
                                - ["org,example)/", "20100101050304", "http://example.org:80/", "text/html", "200", "ABCDEF123456", "1234"]
                                - ["org,example)/", "20100201050304", "http://example.org:80/", "text/html", "200", "ABCDEF789012", "1256"]
                default:
                    description: Unexpected error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
servers:
    - url: https://archive.org
    - url: https://web.archive.org
      description: Internet Archive Web Server (CDX API)
