openapi: 3.1.0
info:
  title: Impossible Symbols API
  description: |
    API for searching and retrieving AAC symbols from various symbol repositories including ARASAAC, Sclera, Mulberry, and more.
    Supports multiple languages, skin tone variants, and high-contrast options.
  version: 1.0.0

servers:
  - url: https://api.opensymbols.org/api/v2

security:
  - apiKeyAuth: []

paths:
  /symbols:
    get:
      summary: Search symbols across all repositories
      operationId: searchSymbols
      parameters:
        - in: query
          name: q
          description: |
            Search term(s). Can include special modifiers:
            - repo:[repo_key] to limit results to a specific library
            - favor:[repo_key] to favor results from a specific library
            - hc:1 to favor high-contrast results
          required: true
          schema:
            type: string
        - in: query
          name: locale
          description: Two-character locale code in lowercase (e.g. 'en', 'es')
          schema:
            type: string
            default: en
            pattern: '^[a-z]{2}$'
        - in: query
          name: safe
          description: Enable/disable safe search (0 to disable)
          schema:
            type: integer
            enum: [0, 1]
            default: 1
      responses:
        '200':
          description: List of matching symbols
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Symbol'
        '401':
          description: Unauthorized - Invalid or expired access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many requests - Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /symbols/{repo_key}/{symbol_key}:
    get:
      summary: Retrieve a specific symbol by its repository and key
      operationId: getSymbol
      parameters:
        - in: path
          name: repo_key
          required: true
          description: Repository identifier (e.g., 'arasaac', 'mulberry', 'sclera')
          schema:
            type: string
        - in: path
          name: symbol_key
          required: true
          description: Unique symbol key within the repository
          schema:
            type: string
        - in: query
          name: id
          required: true
          description: Numeric ID of the symbol
          schema:
            type: integer
      responses:
        '200':
          description: Symbol details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Symbol'
        '404':
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      name: access_token
      in: query
      description: |
        API access token. Can be provided either as a query parameter 'access_token'
        or in the Authorization header.

  schemas:
    Symbol:
      type: object
      required:
        - id
        - symbol_key
        - name
        - locale
        - license
        - repo_key
        - image_url
      properties:
        id:
          type: integer
          description: Unique numeric identifier
        symbol_key:
          type: string
          description: Unique key within the repository
        name:
          type: string
          description: Symbol name in the specified locale
        locale:
          type: string
          description: Two-character locale code
        license:
          type: string
          description: License type (e.g., 'CC BY-NC-SA')
        license_url:
          type: string
          format: uri
          description: URL to the license details
        author:
          type: string
          description: Symbol author or creator
        author_url:
          type: string
          format: uri
          description: URL to the author's page or profile
        source_url:
          type: string
          format: uri
          description: Original source URL of the symbol
        skins:
          type: boolean
          description: Whether the symbol supports skin tone variants
        repo_key:
          type: string
          description: Repository identifier
        hc:
          type: boolean
          description: Whether this is a high-contrast version
        extension:
          type: string
          description: File extension (e.g., 'png', 'svg')
        image_url:
          type: string
          format: uri
          description: URL to the symbol image
        search_string:
          type: string
          description: Additional search terms
        unsafe_result:
          type: boolean
          description: Whether the result is flagged as unsafe
        _href:
          type: string
          description: API endpoint URL for this symbol
        details_url:
          type: string
          description: Web UI URL for viewing symbol details

    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Error message
        code:
          type: string
          description: Error code

  examples:
    searchSymbols:
      value:
        ReqExample:
          q: "cat repo:arasaac"
          locale: "en"
          safe: 1
        RespExample:
          - id: 2211
            symbol_key: "cat-1-2fcbe1a4"
            name: "cat"
            locale: "en"
            license: "CC BY-NC-SA"
            license_url: "http://creativecommons.org/licenses/by-nc-sa/3.0/"
            author: "Sergio Palao"
            author_url: "http://www.catedu.es/arasaac/condiciones_uso.php"
            source_url: null
            skins: true
            repo_key: "arasaac"
            hc: false
            extension: "png"
            image_url: "https://api.opensymbols.org/v2/symbols/arasaac/cat-1-2fcbe1a4.png"
            search_string: null
            unsafe_result: false
            _href: "/api/v1/symbols/arasaac/cat-1-2fcbe1a4?id=2211"
            details_url: "/symbols/arasaac/cat-1-2fcbe1a4?id=2211"

    getSymbol:
      value:
        ReqExample:
          repo_key: "arasaac"
          symbol_key: "cat-1-2fcbe1a4"
          id: 2211
        RespExample:
          id: 2211
          symbol_key: "cat-1-2fcbe1a4"
          name: "cat"
          locale: "en"
          license: "CC BY-NC-SA"
          license_url: "http://creativecommons.org/licenses/by-nc-sa/3.0/"
          author: "Sergio Palao"
          author_url: "http://www.catedu.es/arasaac/condiciones_uso.php"
          source_url: null
          skins: true
          repo_key: "arasaac"
          hc: false
          extension: "png"
          image_url: "https://api.opensymbols.org/v2/symbols/arasaac/cat-1-2fcbe1a4.png"
          search_string: null
          unsafe_result: false
          _href: "/api/v1/symbols/arasaac/cat-1-2fcbe1a4?id=2211"
          details_url: "/symbols/arasaac/cat-1-2fcbe1a4?id=2211" 