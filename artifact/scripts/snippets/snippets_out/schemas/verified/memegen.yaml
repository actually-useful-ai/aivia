openapi: 3.1.0
info:
  title: Memegen API
  description: |
    Free and open-source API to generate and customize memes using predefined templates or custom images.
    The API is stateless, with URLs containing all information necessary to generate meme images.
  version: 1.0.0

servers:
  - url: https://api.memegen.link
    description: Memegen API server

paths:
  /templates:
    get:
      operationId: getTemplates
      summary: Get meme templates
      description: Fetch the list of available meme templates.
      responses:
        '200':
          description: A list of available meme templates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateList'
              example:
                templates:
                  - id: "drake"
                    name: "Drake Hotline Bling"
                    url: "https://api.memegen.link/images/drake.png"
                  - id: "doge"
                    name: "Doge"
                    url: "https://api.memegen.link/images/doge.png"

  /fonts:
    get:
      operationId: getFonts
      summary: Get available fonts
      description: Fetch the list of available fonts for meme text.
      responses:
        '200':
          description: A list of available fonts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FontList'
              example:
                fonts:
                  - id: "impact"
                    name: "Impact"
                    url: "https://www.dafontfree.io/impact-font/"
                  - id: "titilliumweb"
                    name: "Titillium Web Black"
                    url: "https://fonts.google.com/specimen/Titillium+Web"
                    aliases: ["thick"]

  /images/{template_id}/{top_text}/{bottom_text}:
    get:
      operationId: generateMeme
      summary: Generate a meme
      description: |
        Create a meme using a specified template with top and bottom text.
        The response is the generated image in the requested format.
      parameters:
        - name: template_id
          in: path
          required: true
          description: The ID of the template.
          schema:
            type: string
          example: "drake"
        - name: top_text
          in: path
          required: true
          description: Top text for the meme. Use underscore (_) or dash (-) for spaces.
          schema:
            type: string
          example: "Using_paid_meme_generators"
        - name: bottom_text
          in: path
          required: true
          description: Bottom text for the meme. Use underscore (_) or dash (-) for spaces.
          schema:
            type: string
          example: "Using_free_meme_API"
        - name: font
          in: query
          description: |
            Font style to use. Options include impact, titilliumweb (alias: thick), kalam (alias: comic), 
            notosans, and hgminchob (alias: jp). Default is 'impact'.
          schema:
            type: string
          example: "impact"
        - name: max_font_size
          in: query
          description: Maximum font size in pixels.
          schema:
            type: integer
          example: 50
        - name: style
          in: query
          description: |
            Specify style for alternate meme formats, overlays, or a custom overlay URL.
            Some templates offer multiple styles (e.g., 'maga' for some templates).
          schema:
            type: string
        - name: width
          in: query
          description: Width of the meme image in pixels.
          schema:
            type: integer
        - name: height
          in: query
          description: Height of the meme image in pixels.
          schema:
            type: integer
        - name: layout
          in: query
          description: |
            Text layout. Use 'top' to position both lines of text above the image.
            Default places text at top and bottom.
          schema:
            type: string
            enum: [default, top]
        - name: center
          in: query
          description: Position of overlay relative to the top-left corner (when using style as an overlay URL).
          schema:
            type: string
            pattern: '^[0-9\.]+,[0-9\.]+$'
          example: "0.5,0.5"
        - name: scale
          in: query
          description: Ratio of the background image's dimensions (when using style as an overlay URL).
          schema:
            type: number
            format: float
          example: 0.8
        - name: watermark
          in: query
          description: Custom watermark text (requires authentication).
          schema:
            type: string
        - name: api_key
          in: query
          description: API key for authentication (alternative to X-API-Key header).
          schema:
            type: string
      responses:
        '200':
          description: |
            The generated meme image. The format is determined by the extension in the URL.
            For example, .jpg, .png, .gif, or .webp.
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/gif:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                $ref: '#/components/schemas/MemeResponse'
              example:
                url: "https://api.memegen.link/images/drake/Using_paid_meme_generators/Using_free_meme_API.jpg"
        '400':
          description: Invalid parameters provided.
        '500':
          description: Internal server error.
      security:
        - apiKeyAuth: []

  /images/custom/{top_text}/{bottom_text}:
    get:
      operationId: generateCustomMeme
      summary: Generate a custom meme
      description: |
        Create a meme using a custom background image with top and bottom text.
        The response is the generated image in the requested format.
      parameters:
        - name: top_text
          in: path
          required: true
          description: Top text for the meme. Use underscore (_) or dash (-) for spaces.
          schema:
            type: string
          example: "When_the_code"
        - name: bottom_text
          in: path
          required: true
          description: Bottom text for the meme. Use underscore (_) or dash (-) for spaces.
          schema:
            type: string
          example: "Finally_works"
        - name: background
          in: query
          required: true
          description: URL of the background image to use for the meme.
          schema:
            type: string
            format: uri
          example: "https://example.com/happy.jpg"
        - name: font
          in: query
          description: |
            Font style to use. Options include impact, titilliumweb (alias: thick), kalam (alias: comic), 
            notosans, and hgminchob (alias: jp). Default is 'impact'.
          schema:
            type: string
          example: "arial"
        - name: max_font_size
          in: query
          description: Maximum font size in pixels.
          schema:
            type: integer
          example: 48
        - name: width
          in: query
          description: Width of the meme image in pixels.
          schema:
            type: integer
        - name: height
          in: query
          description: Height of the meme image in pixels.
          schema:
            type: integer
        - name: layout
          in: query
          description: |
            Text layout. Use 'top' to position both lines of text above the image.
            Default places text at top and bottom.
          schema:
            type: string
            enum: [default, top]
        - name: watermark
          in: query
          description: Custom watermark text (requires authentication).
          schema:
            type: string
        - name: api_key
          in: query
          description: API key for authentication (alternative to X-API-Key header).
          schema:
            type: string
      responses:
        '200':
          description: |
            The generated meme image. The format is determined by the extension in the URL.
            For example, .jpg, .png, .gif, or .webp.
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/gif:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                $ref: '#/components/schemas/MemeResponse'
              example:
                url: "https://api.memegen.link/images/custom/When_the_code/Finally_works.jpg"
        '400':
          description: Invalid parameters provided.
        '500':
          description: Internal server error.
      security:
        - apiKeyAuth: []

  /images/preview.jpg:
    get:
      operationId: previewMeme
      summary: Preview meme generation
      description: |
        Generate a low-resolution preview of a meme for typeahead/live previews.
        Optimized for bandwidth and performance with smaller image sizes.
      parameters:
        - name: template
          in: query
          required: true
          description: |
            Template ID or URL. For custom backgrounds, provide the image URL.
          schema:
            type: string
          example: "fry"
        - name: lines[]
          in: query
          description: |
            Text lines for the meme. First item is top text, second is bottom text.
            Can be specified multiple times, e.g., lines[]=top&lines[]=bottom
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          example: ["first line", "second line"]
        - name: font
          in: query
          description: |
            Font style to use. Options include impact, titilliumweb (alias: thick), kalam (alias: comic), 
            notosans, and hgminchob (alias: jp). Default is 'impact'.
          schema:
            type: string
        - name: api_key
          in: query
          description: API key for authentication (alternative to X-API-Key header).
          schema:
            type: string
      responses:
        '200':
          description: A low-resolution JPEG preview of the meme.
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid parameters provided.
        '500':
          description: Internal server error.
      security:
        - apiKeyAuth: []

components:
  schemas:
    TemplateList:
      type: object
      properties:
        templates:
          type: array
          items:
            type: object
            required:
              - id
              - name
              - url
            properties:
              id:
                type: string
                description: Unique identifier for the meme template.
              name:
                type: string
                description: Name of the meme template.
              url:
                type: string
                format: uri
                description: URL of the meme template image.
              styles:
                type: array
                items:
                  type: string
                description: Available alternate styles for this template.

    FontList:
      type: object
      properties:
        fonts:
          type: array
          items:
            type: object
            required:
              - id
              - name
            properties:
              id:
                type: string
                description: Identifier for the font.
              name:
                type: string
                description: Display name of the font.
              url:
                type: string
                format: uri
                description: URL with more information about the font.
              aliases:
                type: array
                items:
                  type: string
                description: Alternative identifiers for the font.

    MemeResponse:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: URL of the generated meme image.

  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        API key for authentication. Can be provided as an X-API-Key header
        or as an api_key query parameter. Authentication removes watermarks
        and rate limits. 