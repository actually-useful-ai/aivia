openapi: 3.1.0
info:
  title: BlueSky API
  description: |
    API for interacting with BlueSky (AT Protocol) services. This API provides access to social features including posts, feeds, actors, and more.
    Public endpoints can be accessed directly via https://public.api.bsky.app, while authenticated endpoints are accessed through the user's PDS.
  version: '1.0.0'

servers:
  - url: https://public.api.bsky.app/xrpc
    description: Public AppView API (unauthenticated endpoints)
  - url: https://bsky.social/xrpc
    description: PDS Entryway (authenticated endpoints)

security:
  - bearerAuth: []

paths:
  /app.bsky.actor.searchActors:
    get:
      summary: Search for actors
      description: Search for actors by query.
      operationId: searchActors
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search query string for actors.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
            maximum: 100
          description: Maximum number of results to return.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Cursor for pagination.
      responses:
        '200':
          description: A list of actors matching the search query.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActorSearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /app.bsky.actor.getProfile:
    get:
      summary: Get actor profile
      description: Retrieve the profile of a specific actor.
      operationId: getActorProfile
      parameters:
        - name: actor
          in: query
          required: true
          schema:
            type: string
          description: The actor's handle or DID.
      responses:
        '200':
          description: The profile of the specified actor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileViewDetailed'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /app.bsky.feed.getTimeline:
    get:
      summary: Get home timeline
      description: Get a view of the requesting account's home timeline.
      operationId: getTimeline
      parameters:
        - name: algorithm
          in: query
          required: false
          schema:
            type: string
          description: The algorithm used for timeline ranking.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
          description: Maximum number of posts to return.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Cursor for pagination.
      responses:
        '200':
          description: Timeline feed view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /app.bsky.feed.getAuthorFeed:
    get:
      summary: Get feed from specific author
      description: Retrieve posts from a specific author's feed.
      operationId: getAuthorFeed
      parameters:
        - name: actor
          in: query
          required: true
          schema:
            type: string
          description: The actor's handle or DID.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
          description: Maximum number of posts to return.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Cursor for pagination.
      responses:
        '200':
          description: Author's feed view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /app.bsky.feed.getLikes:
    get:
      summary: Get likes for a post
      description: Get like records which reference a subject post.
      operationId: getLikes
      parameters:
        - name: uri
          in: query
          required: true
          schema:
            type: string
          description: AT-URI of the subject post.
        - name: cid
          in: query
          required: true
          schema:
            type: string
          description: CID of the subject post.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
          description: Maximum number of likes to return.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Cursor for pagination.
      responses:
        '200':
          description: List of likes for the post.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LikesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /app.bsky.graph.getFollows:
    get:
      summary: Get list of followed actors
      description: Get a list of actors that the specified actor follows.
      operationId: getFollows
      parameters:
        - name: actor
          in: query
          required: true
          schema:
            type: string
          description: The actor's handle or DID.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
          description: Maximum number of follows to return.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Cursor for pagination.
      responses:
        '200':
          description: List of followed actors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /app.bsky.graph.getFollowers:
    get:
      summary: Get list of followers
      description: Get a list of actors that follow the specified actor.
      operationId: getFollowers
      parameters:
        - name: actor
          in: query
          required: true
          schema:
            type: string
          description: The actor's handle or DID.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
          description: Maximum number of followers to return.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Cursor for pagination.
      responses:
        '200':
          description: List of followers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /app.bsky.notification.listNotifications:
    get:
      summary: List notifications
      description: Enumerate notifications for the requesting account.
      operationId: listNotifications
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
          description: Maximum number of notifications to return.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Cursor for pagination.
      responses:
        '200':
          description: List of notifications.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /app.bsky.notification.getUnreadCount:
    get:
      summary: Get unread notification count
      description: Get the count of unread notifications.
      operationId: getUnreadNotificationCount
      responses:
        '200':
          description: Unread notification count.
          content:
            application/json:
              schema:
                type: object
                required:
                  - count
                properties:
                  count:
                    type: integer
                    description: Number of unread notifications
        '401':
          $ref: '#/components/responses/Unauthorized'

  /app.bsky.notification.updateSeen:
    post:
      summary: Mark notifications as seen
      description: Update when the user last viewed their notifications.
      operationId: updateNotificationsSeen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - seenAt
              properties:
                seenAt:
                  type: string
                  format: date-time
                  description: Timestamp when notifications were last seen
      responses:
        '200':
          description: Successfully updated seen timestamp.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /app.bsky.graph.muteActor:
    post:
      summary: Mute an actor
      description: Mute an actor by their DID or handle.
      operationId: muteActor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - actor
              properties:
                actor:
                  type: string
                  description: The DID or handle of the actor to mute
      responses:
        '200':
          description: Successfully muted the actor.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /app.bsky.graph.unmuteActor:
    post:
      summary: Unmute an actor
      description: Unmute a previously muted actor.
      operationId: unmuteActor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - actor
              properties:
                actor:
                  type: string
                  description: The DID or handle of the actor to unmute
      responses:
        '200':
          description: Successfully unmuted the actor.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /app.bsky.graph.getMutes:
    get:
      summary: Get muted actors
      description: Get a list of actors that the requesting account has muted.
      operationId: getMutes
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
          description: Maximum number of muted actors to return.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Cursor for pagination.
      responses:
        '200':
          description: List of muted actors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /app.bsky.graph.getBlocks:
    get:
      summary: Get blocked actors
      description: Get a list of actors that the requesting account has blocked.
      operationId: getBlocks
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
          description: Maximum number of blocked actors to return.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Cursor for pagination.
      responses:
        '200':
          description: List of blocked actors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlocksResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /com.atproto.repo.createRecord:
    post:
      summary: Create a new record
      description: Create a new record in the repository (e.g., post, like, follow).
      operationId: createRecord
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - repo
                - collection
                - record
              properties:
                repo:
                  type: string
                  description: The DID of the repo.
                collection:
                  type: string
                  description: The NSID of the record collection.
                record:
                  type: object
                  description: The record to create.
                rkey:
                  type: string
                  description: The key of the record (optional).
                validate:
                  type: boolean
                  default: true
                  description: Whether to validate the record.
      responses:
        '200':
          description: Successfully created record.
          content:
            application/json:
              schema:
                type: object
                required:
                  - uri
                  - cid
                properties:
                  uri:
                    type: string
                    description: AT-URI of the created record
                  cid:
                    type: string
                    description: CID of the created record
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Bearer token authentication. For authenticated endpoints, you need to:
        1. Create a session with your handle/password
        2. Use the returned access JWT as a bearer token
        3. Include it in the Authorization header

  responses:
    BadRequest:
      description: Invalid request parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token expired.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error code
        message:
          type: string
          description: Human-readable error message

    ActorSearchResponse:
      type: object
      required:
        - actors
      properties:
        actors:
          type: array
          items:
            $ref: '#/components/schemas/ActorView'
        cursor:
          type: string
          description: Pagination cursor

    ActorView:
      type: object
      required:
        - did
        - handle
      properties:
        did:
          type: string
          description: Decentralized identifier
        handle:
          type: string
          description: User handle (e.g., @user.bsky.social)
        displayName:
          type: string
          description: Display name
        description:
          type: string
          description: Profile description/bio
        avatar:
          type: string
          format: uri
          description: Avatar image URL
        indexedAt:
          type: string
          format: date-time
          description: When this profile was last indexed

    ProfileViewDetailed:
      type: object
      required:
        - did
        - handle
      properties:
        did:
          type: string
        handle:
          type: string
        displayName:
          type: string
        description:
          type: string
        avatar:
          type: string
          format: uri
        banner:
          type: string
          format: uri
        followersCount:
          type: integer
        followsCount:
          type: integer
        postsCount:
          type: integer
        indexedAt:
          type: string
          format: date-time
        viewer:
          $ref: '#/components/schemas/ViewerState'

    ViewerState:
      type: object
      properties:
        muted:
          type: boolean
        blockedBy:
          type: boolean
        blocking:
          type: string
          description: DID of blocking if blocked
        following:
          type: string
          description: DID of following if followed
        followedBy:
          type: string
          description: DID of follower if following viewer

    FeedResponse:
      type: object
      required:
        - feed
      properties:
        feed:
          type: array
          items:
            $ref: '#/components/schemas/FeedView'
        cursor:
          type: string

    FeedView:
      type: object
      required:
        - post
      properties:
        post:
          $ref: '#/components/schemas/PostView'
        reply:
          $ref: '#/components/schemas/ReplyRef'
        reason:
          $ref: '#/components/schemas/ReasonRepost'

    PostView:
      type: object
      required:
        - uri
        - cid
        - author
        - record
        - indexedAt
      properties:
        uri:
          type: string
          description: AT-URI of the post
        cid:
          type: string
          description: Content identifier
        author:
          $ref: '#/components/schemas/ActorView'
        record:
          $ref: '#/components/schemas/PostRecord'
        embed:
          $ref: '#/components/schemas/Embed'
        replyCount:
          type: integer
        repostCount:
          type: integer
        likeCount:
          type: integer
        indexedAt:
          type: string
          format: date-time
        viewer:
          $ref: '#/components/schemas/ViewerState'

    PostRecord:
      type: object
      required:
        - text
        - createdAt
      properties:
        text:
          type: string
        createdAt:
          type: string
          format: date-time
        embed:
          $ref: '#/components/schemas/Embed'
        reply:
          $ref: '#/components/schemas/ReplyRef'

    Embed:
      oneOf:
        - $ref: '#/components/schemas/EmbedImages'
        - $ref: '#/components/schemas/EmbedExternal'
        - $ref: '#/components/schemas/EmbedRecord'

    EmbedImages:
      type: object
      required:
        - images
      properties:
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'

    Image:
      type: object
      required:
        - thumb
        - fullsize
        - alt
      properties:
        thumb:
          type: string
          format: uri
        fullsize:
          type: string
          format: uri
        alt:
          type: string

    EmbedExternal:
      type: object
      required:
        - external
      properties:
        external:
          type: object
          required:
            - uri
            - title
            - description
          properties:
            uri:
              type: string
              format: uri
            title:
              type: string
            description:
              type: string
            thumb:
              type: string
              format: uri

    EmbedRecord:
      type: object
      required:
        - record
      properties:
        record:
          $ref: '#/components/schemas/RecordView'

    RecordView:
      type: object
      required:
        - uri
        - cid
        - author
        - value
        - indexedAt
      properties:
        uri:
          type: string
        cid:
          type: string
        author:
          $ref: '#/components/schemas/ActorView'
        value:
          type: object
        indexedAt:
          type: string
          format: date-time
        embeds:
          type: array
          items:
            $ref: '#/components/schemas/Embed'

    ReplyRef:
      type: object
      required:
        - root
        - parent
      properties:
        root:
          $ref: '#/components/schemas/PostView'
        parent:
          $ref: '#/components/schemas/PostView'

    ReasonRepost:
      type: object
      required:
        - by
        - indexedAt
      properties:
        by:
          $ref: '#/components/schemas/ActorView'
        indexedAt:
          type: string
          format: date-time

    LikesResponse:
      type: object
      required:
        - likes
      properties:
        likes:
          type: array
          items:
            $ref: '#/components/schemas/Like'
        cursor:
          type: string

    Like:
      type: object
      required:
        - indexedAt
        - createdAt
        - actor
      properties:
        indexedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        actor:
          $ref: '#/components/schemas/ActorView'

    FollowsResponse:
      type: object
      required:
        - subject
        - follows
      properties:
        subject:
          $ref: '#/components/schemas/ActorView'
        follows:
          type: array
          items:
            $ref: '#/components/schemas/ActorView'
        cursor:
          type: string

    NotificationsResponse:
      type: object
      required:
        - notifications
      properties:
        notifications:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        cursor:
          type: string
          description: Pagination cursor

    Notification:
      type: object
      required:
        - uri
        - cid
        - author
        - reason
        - record
        - isRead
        - indexedAt
      properties:
        uri:
          type: string
          description: AT-URI of the notification record
        cid:
          type: string
          description: CID of the notification record
        author:
          $ref: '#/components/schemas/ActorView'
        reason:
          type: string
          enum: [like, repost, follow, mention, reply, quote]
          description: The reason for the notification
        reasonSubject:
          type: string
          description: The AT-URI of the subject of the notification (e.g., the post that was liked)
        record:
          type: object
          description: The record that caused the notification
        isRead:
          type: boolean
          description: Whether the notification has been read
        indexedAt:
          type: string
          format: date-time
          description: When the notification was indexed

    MutesResponse:
      type: object
      required:
        - mutes
      properties:
        mutes:
          type: array
          items:
            $ref: '#/components/schemas/ActorView'
        cursor:
          type: string
          description: Pagination cursor

    BlocksResponse:
      type: object
      required:
        - blocks
      properties:
        blocks:
          type: array
          items:
            $ref: '#/components/schemas/ActorView'
        cursor:
          type: string
          description: Pagination cursor
``` 