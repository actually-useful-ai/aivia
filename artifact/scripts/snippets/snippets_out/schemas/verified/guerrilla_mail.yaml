openapi: 3.1.0
info:
  title: Guerrilla Mail API
  version: 1.0.0
  description: API for creating and managing temporary disposable email addresses.

servers:
  - url: https://api.guerrillamail.com/ajax.php

paths:
  /get_email_address:
    get:
      operationId: getEmailAddress
      summary: Get a new temporary email address
      parameters:
        - name: ip
          in: query
          required: false
          description: IP address for rate limiting
          schema:
            type: string
        - name: agent
          in: query
          required: false
          description: User agent string
          schema:
            type: string
      responses:
        "200":
          description: Successfully retrieved email address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailAddressResponse'
        default:
          description: Unexpected error

  /check_email:
    get:
      operationId: checkEmail
      summary: Check for new emails
      parameters:
        - name: seq
          in: query
          required: true
          description: Sequence number for pagination
          schema:
            type: integer
        - name: sid_token
          in: query
          required: true
          description: Session token
          schema:
            type: string
      responses:
        "200":
          description: Successfully retrieved emails
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailListResponse'
        default:
          description: Unexpected error

  /fetch_email:
    get:
      operationId: fetchEmail
      summary: Fetch a specific email by ID
      parameters:
        - name: email_id
          in: query
          required: true
          description: ID of the email to fetch
          schema:
            type: string
        - name: sid_token
          in: query
          required: true
          description: Session token
          schema:
            type: string
      responses:
        "200":
          description: Successfully retrieved email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailResponse'
        default:
          description: Unexpected error

components:
  schemas:
    EmailAddressResponse:
      type: object
      properties:
        email_addr:
          type: string
          description: The temporary email address
        email_timestamp:
          type: integer
          description: Unix timestamp of email creation
        sid_token:
          type: string
          description: Session token for subsequent requests
        alias:
          type: string
          description: Email alias if set
        site_id:
          type: integer
          description: Site identifier

    EmailListResponse:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: '#/components/schemas/EmailSummary'
        count:
          type: integer
          description: Total number of emails
        seq:
          type: integer
          description: Current sequence number

    EmailSummary:
      type: object
      properties:
        mail_id:
          type: string
          description: Unique identifier for the email
        mail_from:
          type: string
          description: Sender email address
        mail_subject:
          type: string
          description: Email subject
        mail_excerpt:
          type: string
          description: Brief excerpt of the email content
        mail_timestamp:
          type: integer
          description: Unix timestamp of when the email was received
        mail_read:
          type: boolean
          description: Whether the email has been read

    EmailResponse:
      type: object
      properties:
        mail_id:
          type: string
          description: Unique identifier for the email
        mail_from:
          type: string
          description: Sender email address
        mail_subject:
          type: string
          description: Email subject
        mail_body:
          type: string
          description: Full email body content
        mail_timestamp:
          type: integer
          description: Unix timestamp of when the email was received
        mail_size:
          type: integer
          description: Size of the email in bytes
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'

    Attachment:
      type: object
      properties:
        filename:
          type: string
          description: Name of the attached file
        size:
          type: integer
          description: Size of the attachment in bytes
        content_type:
          type: string
          description: MIME type of the attachment

  examples:
    getEmailAddress:
      value:
        ReqExample:
          ip: "192.168.1.1"
          agent: "Mozilla/5.0"
        RespExample:
          email_addr: "temp123@guerrillamail.com"
          email_timestamp: 1634567890
          sid_token: "abc123def456"
          alias: "temp123"
          site_id: 1

    checkEmail:
      value:
        ReqExample:
          seq: 0
          sid_token: "abc123def456"
        RespExample:
          list:
            - mail_id: "1234567"
              mail_from: "sender@example.com"
              mail_subject: "Test Email"
              mail_excerpt: "This is a test email..."
              mail_timestamp: 1634567890
              mail_read: false
          count: 1
          seq: 1

    fetchEmail:
      value:
        ReqExample:
          email_id: "1234567"
          sid_token: "abc123def456"
        RespExample:
          mail_id: "1234567"
          mail_from: "sender@example.com"
          mail_subject: "Test Email"
          mail_body: "This is the full content of the test email..."
          mail_timestamp: 1634567890
          mail_size: 1024
          attachments:
            - filename: "test.txt"
              size: 512
              content_type: "text/plain" 