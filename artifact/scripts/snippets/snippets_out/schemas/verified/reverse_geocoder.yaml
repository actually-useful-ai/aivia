openapi: 3.1.0
info:
  title: Reverse Geocoder
  version: 1.0.0
  description: Turns latitude/longitude into an address, or an address into latitude/longitude.

servers:
  - url: https://geocode.maps.co

paths:
  /reverse:
    get:
      operationId: reverseGeocode
      summary: Convert geographic coordinates into a human-readable address.
      parameters:
        - name: lat
          in: query
          required: true
          description: The latitude to reverse geocode.
          schema:
            type: number
        - name: lon
          in: query
          required: true
          description: The longitude to reverse geocode.
          schema:
            type: number
        - name: api_key
          in: query
          required: true
          description: Your API key.
          schema:
            type: string
        - name: format
          in: query
          required: true
          description: The format of the response data.
          schema:
            type: string
            default: json
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReverseGeocodeResponse'
        default:
          description: Error

  /search:
    get:
      operationId: forwardGeocode
      summary: Convert a human-readable address into geographic coordinates.
      parameters:
        - name: q
          in: query
          required: true
          description: The address to geocode.
          schema:
            type: string
        - name: api_key
          in: query
          required: true
          description: Your API key.
          schema:
            type: string
        - name: format
          in: query
          description: The format of the response data.
          schema:
            type: string
            default: json
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForwardGeocodeResponse'
        default:
          description: Error

components:
  schemas:
    ReverseGeocodeResponse:
      type: object
      properties:
        address:
          type: object
          properties:
            ISO3166-2-lvl4:
              type: string
              description: ISO 3166-2 code for the administrative level 4 area.
            city:
              type: string
              description: City name.
            country:
              type: string
              description: Country name.
            country_code:
              type: string
              description: Two-letter country code.
            county:
              type: string
              description: County name.
            house_number:
              type: string
              description: House number.
            postcode:
              type: string
              description: Postal code.
            residential:
              type: string
              description: Residential area name.
            road:
              type: string
              description: Street name.
            state:
              type: string
              description: State name.
        boundingbox:
          type: array
          items:
            type: string
          description: Bounding box coordinates.
        display_name:
          type: string
          description: Full formatted address.
        lat:
          type: string
          description: Latitude of the location.
        licence:
          type: string
          description: License information.
        lon:
          type: string
          description: Longitude of the location.
        osm_id:
          type: number
          description: OpenStreetMap ID.
        osm_type:
          type: string
          description: OpenStreetMap element type.
        place_id:
          type: number
          description: Place ID.

    ForwardGeocodeResponse:
      type: array
      items:
        type: object
        properties:
          boundingbox:
            type: array
            items:
              type: string
            description: Bounding box coordinates.
          class:
            type: string
            description: Location class.
          display_name:
            type: string
            description: Full formatted address.
          importance:
            type: number
            description: Location importance ranking.
          lat:
            type: string
            description: Latitude of the location.
          licence:
            type: string
            description: License information.
          lon:
            type: string
            description: Longitude of the location.
          osm_id:
            type: number
            description: OpenStreetMap ID.
          osm_type:
            type: string
            description: OpenStreetMap element type.
          place_id:
            type: number
            description: Place ID.
          type:
            type: string
            description: Location type.

  securitySchemes:
    apiKey:
      type: apiKey
      name: api_key
      in: query

  examples:
    forwardGeocode:
      value:
        ReqExample:
          api_key: 66be6044be017202539979xpl8d5b6b
          q: 309 por la mar cir 93103
        RespExample:
          - boundingbox:
              - "34.4188"
              - "34.4189"
              - "-119.666089"
              - "-119.665989"
            class: place
            display_name: 309, Por la Mar Circle, El Escorial Villas, Santa Barbara, Santa Barbara County, California, 93103, United States
            importance: 0.62001
            lat: "34.41885"
            licence: Data © OpenStreetMap contributors, ODbL 1.0. https://osm.org/copyright
            lon: "-119.666039"
            osm_id: 6070158923
            osm_type: node
            place_id: 285115037
            type: house

    reverseGeocode:
      value:
        ReqExample:
          api_key: 66be6044be017202539979xpl8d5b6b
          format: json
          lat: 34.41885
          lon: -119.666039
        RespExample:
          address:
            ISO3166-2-lvl4: US-CA
            city: Santa Barbara
            country: United States
            country_code: us
            county: Santa Barbara County
            house_number: "309"
            postcode: "93103"
            residential: El Escorial Villas
            road: Por la Mar Circle
            state: California
          boundingbox:
            - "34.4188"
            - "34.4189"
            - "-119.666089"
            - "-119.665989"
          display_name: 309, Por la Mar Circle, El Escorial Villas, Santa Barbara, Santa Barbara County, California, 93103, United States
          lat: "34.41885"
          licence: Data © OpenStreetMap contributors, ODbL 1.0. https://osm.org/copyright
          lon: "-119.666039"
          osm_id: 6070158923
          osm_type: node
          place_id: 285115037 