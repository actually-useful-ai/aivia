{% set name = "llamaball" %}
{% set version = "1.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/llamaball-{{ version }}.tar.gz
  sha256: 6f53aaffbbb3fc09447621ac225c2e161b11b907438554aad11a08a45300dbf0

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  entry_points:
    - llamaball = llamaball.cli:main

requirements:
  host:
    - python >=3.8
    - pip
    - hatchling
  run:
    - python >=3.8
    - typer >=0.9.0
    - ollama >=0.1.7
    - numpy >=1.21.0
    - tiktoken >=0.5.0
    - prompt_toolkit >=3.0.0
    - markdown-it-py >=3.0.0
    - tqdm >=4.64.0
    - rich >=13.0.0
    - pdfminer.six >=202010
    - python-docx >=1.1.2
    - openpyxl >=3.1.0
    - xlrd >=2.0.1
    - beautifulsoup4 >=4.9.0
    - pypandoc >=1.7.0

test:
  imports:
    - llamaball
    - llamaball.core
    - llamaball.cli
  commands:
    - llamaball --help

about:
  home: https://github.com/coolhand/llamaball
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: High-performance document chat and RAG system powered by Ollama
  description: |
    Llamaball is a comprehensive toolkit for document ingestion, embedding 
    generation, and conversational AI interactions with your local documents. 
    Built with local privacy and performance as core principles.
  doc_url: https://github.com/coolhand/llamaball#readme
  dev_url: https://github.com/coolhand/llamaball

extra:
  recipe-maintainers:
    - lukeslp 